name: Weekly GCP Documentation Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Executes every Sunday at midnight
  workflow_dispatch: # Allows manual override execution triggers

jobs:
  sync_graph:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Astral UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run synchronization logic
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run sync_pipeline.py
